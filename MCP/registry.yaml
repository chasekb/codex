version: 1
servers:
  - id: context7
    type: docs
    tools: [resolve-library-id, get-library-docs]
  - id: brave
    type: search
    tools: [web_search, news_search, image_search, video_search]
  - id: playwright
    type: browser
    tools: [navigate, click, fill, evaluate, screenshot, close]
resources:
  - id: codebase
    description: Local repository files
  - id: runtime_logs
    description: Tool/runtime outputs for verification
  - id: memory_session
    description: Short-term local session memory
  - id: memory_facts
    description: Persistent compact fact memory
  - id: memory_decisions
    description: Persistent compact decision memory
