version: 1
tokens:
  max_input_tokens: 4000
  max_output_tokens: 600
  reserve_output_tokens: 200
  hard_abort_tokens: 12000
execution:
  max_retries_per_step: 1
  max_fallback_tools: 1
  stop_on_first_sufficient_result: true
context:
  include_only:
    - relevant_files
    - failing_output
    - required_config
  drop:
    - unrelated_logs
    - full_directory_dumps
    - repeated_instructions
