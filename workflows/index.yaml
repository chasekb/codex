version: 1
workflows:
  - id: plan-only
    trigger: planning_request
    pipeline: pipelines/plan-only.yaml
  - id: request-standard
    trigger: general_change_request
    pipeline: pipelines/request-standard.yaml
  - id: implement-small
    trigger: scoped_change_request
    pipeline: pipelines/implement-small.yaml
  - id: debug-rca
    trigger: bug_or_failure_report
    pipeline: pipelines/debug-rca.yaml
  - id: verify
    trigger: verification_only_request
    pipeline: pipelines/verify.yaml
  - id: research
    trigger: research_request
    pipeline: pipelines/research.yaml
  - id: retro
    trigger: retrospective_request
    pipeline: pipelines/retro.yaml
