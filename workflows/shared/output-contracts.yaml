version: 1
render:
  mode: compact
  allowed: [bullets, checklist, table]
  forbid: [narrative_paragraphs]
contracts:
  plan:
    required:
      - objective
      - impact_surface
      - phased_steps
      - validation
    optional: []
  request_standard:
    required:
      - objective
      - impact_surface
      - phased_steps
      - validation
      - files_changed
      - checks_run
      - status
    optional: []
  implement:
    required:
      - files_changed
      - patch_summary
      - checks_run
      - status
    optional: []
  debug_rca:
    required:
      - symptom
      - repro
      - root_cause
      - remediation
      - regression_result
    optional: []
  verify:
    required:
      - checks
      - outcomes
      - conclusion
    optional: []
  ci_triage:
    required:
      - failure_summary
      - likely_cause
      - evidence
      - next_action
      - confidence
    optional: []
  release_publish:
    required:
      - objective
      - files_changed
      - validation
      - publish_result
      - rollback_note
    optional: []
  dependency_maintenance:
    required:
      - current_state
      - candidate_updates
      - risk_assessment
      - validation_plan
      - status
    optional: []
  research:
    required:
      - objective
      - queries
      - sources_consulted
      - accepted_sources
      - conclusion
      - reuse_hit
    optional: []
  retro:
    required:
      - doctrine_update_summary
      - session_learnings
    optional: []
